<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gravity Sandbox</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas.emscripten {
            border: 0;
            background: #000;
            outline: none;
            max-width: 100vw;
            max-height: 100vh;
        }
        #status {
            position: absolute;
            color: #8a8a91;
            font: 16px system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            // raylib's web ToggleBorderlessWindowed()/ToggleFullscreen() call
            // Module.requestFullscreen(), but emscripten only defines that when
            // built with -sEXPORTED_RUNTIME_METHODS=requestFullscreen. Delegate
            // to the glue's Browser helper instead (GLFW's web port overrides it
            // at init with the version that resizes the canvas and notifies
            // raylib's resize listeners).
            requestFullscreen: function(lockPointer, resizeCanvas) {
                Browser.requestFullscreen(lockPointer, resizeCanvas);
            },
            onRuntimeInitialized: function() {
                document.getElementById('status').style.display = 'none';
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
