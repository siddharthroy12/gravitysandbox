name: Deploy web build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build
        run: |
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web -j"$(nproc)"

      - name: Assemble site
        run: |
          mkdir site
          cp build-web/gravity_sandbox.js build-web/gravity_sandbox.wasm build-web/gravity_sandbox.data site/
          cp build-web/gravity_sandbox.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
